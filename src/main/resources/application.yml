spring:
  application:
    name: event-service

  datasource:
    url: jdbc:postgresql://localhost:5432/event_service
    username: postgres
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8082

